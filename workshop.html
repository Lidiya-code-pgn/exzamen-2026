<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Віртуальна геометрична майстерня (3D & ML)</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(255, 255, 255, 0.9); padding: 20px;
            border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10; border: 2px solid #667eea;
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4b2c85; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #stats {
            background: #eef2ff; padding: 10px; border-radius: 8px;
            margin-top: 15px; border-left: 5px solid #28a745;
        }
        #voice-btn {
            width: 100%; padding: 10px; background: #ff4757; color: white;
            border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        #voice-btn.active { background: #2ed573; box-shadow: 0 0 10px #2ed573; }
        #status-msg { font-size: 0.85rem; color: #666; margin-top: 5px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #667eea; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2 style="margin-top:0; color:#667eea; font-size: 1.2rem;">📐 Налаштування фігури</h2>
        
        <div class="control-group">
            <label>Тип тіла:</label>
            <select id="shape-select" style="width:100%; padding:5px;">
                <option value="cylinder">Правильна Призма / Циліндр</option>
                <option value="cone">Правильна Піраміда / Конус</option>
            </select>
        </div>

        <div class="control-group">
            <label>Висота (h): <span id="h-val">2</span> м</label>
            <input type="range" id="height-slider" min="0.5" max="3.5" step="0.1" value="2">
        </div>

        <div class="control-group">
            <label>Радіус основи (r): <span id="r-val">1</span> м</label>
            <input type="range" id="radius-slider" min="0.3" max="2" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Кількість граней (n): <span id="n-val">6</span></label>
            <input type="range" id="segments-slider" min="3" max="32" step="1" value="6">
        </div>

        <div id="stats">
            <strong>📊 STEM Калькулятор:</strong><br>
            Площа основи: <span id="area-res">3.14</span> м²<br>
            Об'єм тіла: <span id="vol-res">6.28</span> м³
        </div>

        <button id="voice-btn">🎤 УВІМКНУТИ ГОЛОС (ШІ)</button>
        <div id="status-msg">Команди: "піраміда", "вище", "більше граней"</div>
        <a href="./index.html" class="back-link">⬅ Повернутися до конспекту</a>
    </div>

    <a-scene background="color: #f0f2f5">
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 3 2" intensity="0.8"></a-light>

        <a-grid static-body material="opacity: 0.2; color: #667eea"></a-grid>

        <a-entity id="geometry-target" 
                  position="0 0 -5" 
                  geometry="primitive: cylinder; radius: 1; height: 2; segmentsRadial: 6" 
                  material="color: #667eea; opacity: 0.8; metalness: 0.5; roughness: 0.3"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-entity>

        <a-sky color="#d1d8e0"></a-sky>
        <a-entity camera position="0 1.6 0" look-controls wasd-controls></a-entity>
    </a-scene>

    <script>
        const target = document.querySelector('#geometry-target');
        const hSlider = document.querySelector('#height-slider');
        const rSlider = document.querySelector('#radius-slider');
        const nSlider = document.querySelector('#segments-slider');
        const shapeSelect = document.querySelector('#shape-select');
        const voiceBtn = document.querySelector('#voice-btn');

        function updateGeometry() {
            const h = parseFloat(hSlider.value);
            const r = parseFloat(rSlider.value);
            const n = parseInt(nSlider.value);
            const type = shapeSelect.value;

            target.setAttribute('geometry', {
                primitive: type,
                height: h,
                radius: r,
                segmentsRadial: n,
                radiusBottom: r,
                radiusTop: (type === 'cone') ? 0.001 : r
            });

            // Математика
            const sBase = Math.PI * Math.pow(r, 2);
            let volume = (type === 'cone') ? (1/3) * sBase * h : sBase * h;

            document.querySelector('#h-val').innerText = h;
            document.querySelector('#r-val').innerText = r;
            document.querySelector('#n-val').innerText = n;
            document.querySelector('#area-res').innerText = sBase.toFixed(2);
            document.querySelector('#vol-res').innerText = volume.toFixed(2);
        }

        [hSlider, rSlider, nSlider, shapeSelect].forEach(el => el.addEventListener('input', updateGeometry));

        // ML Модуль: Голосове керування
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'uk-UA';
            recognition.continuous = true;

            voiceBtn.addEventListener('click', () => {
                if (voiceBtn.classList.contains('active')) {
                    recognition.stop();
                    voiceBtn.classList.remove('active');
                    voiceBtn.innerText = '🎤 УВІМКНУТИ ГОЛОС';
                } else {
                    recognition.start();
                    voiceBtn.classList.add('active');
                    voiceBtn.innerText = '🔴 СЛУХАЮ...';
                }
            });

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Команда:", command);

                if (command.includes('піраміда') || command.includes('конус')) shapeSelect.value = 'cone';
                if (command.includes('призма') || command.includes('циліндр')) shapeSelect.value = 'cylinder';
                if (command.includes('вище')) hSlider.value = parseFloat(hSlider.value) + 0.5;
                if (command.includes('нижче')) hSlider.value = parseFloat(hSlider.value) - 0.5;
                if (command.includes('більше')) rSlider.value = parseFloat(rSlider.value) + 0.3;
                if (command.includes('менше')) rSlider.value = parseFloat(rSlider.value) - 0.3;
                if (command.includes('грані')) nSlider.value = parseInt(nSlider.value) + 2;

                updateGeometry();
            };
        } else {
            voiceBtn.style.display = 'none';
            document.querySelector('#status-msg').innerText = "Голосове керування не підтримується цим браузером.";
        }
    </script>
</body>
</html>
